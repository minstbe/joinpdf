<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Messages Admin | PDF Split & Merge</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .login-box { max-width: 400px; margin: 100px auto; text-align: center; }
    .msg-card { padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); }
    .msg-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: var(--muted); }
    .msg-body { font-size: 15px; white-space: pre-wrap; }
    .msg-actions { margin-top: 10px; text-align: right; }
    .delete-btn { color: #ef4444; border-color: #ef4444; }
    .delete-btn:hover { background: #fef2f2; }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="brand">Message Admin</div>
    <div class="actions">
      <a href="index.html" class="btn ghost">Home</a>
      <button id="themeToggle" class="btn ghost">Toggle Theme</button>
      <button id="logoutBtn" class="btn ghost hidden">Logout</button>
    </div>
  </header>

  <main class="container">
    <div id="loginView" class="login-box">
      <div class="card">
        <h2 class="card-title">Login</h2>
        <p class="card-desc">Enter the admin password to manage feedback.</p>
        <div class="field">
          <input id="password" type="password" placeholder="Password">
        </div>
        <div class="actions" style="justify-content: center;">
          <button id="loginBtn" class="btn primary">Login</button>
        </div>
        <p id="loginError" style="color:red; margin-top:10px; font-size:14px;"></p>
      </div>
    </div>

    <div id="adminView" class="hidden">
      <div class="card">
        <div class="list-header">
          <h2 class="card-title">Recent Feedback</h2>
          <button id="refreshBtn" class="btn ghost">Refresh</button>
        </div>
        <div id="msgList"></div>
      </div>
    </div>
  </main>

  <script>
    function applyTheme(initial){ var t = initial==="dark" ? "dark" : "light"; document.documentElement.setAttribute("data-theme", t) }
    var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
    applyTheme(localStorage.getItem("theme") || (prefersDark ? "dark" : "light"))
    document.getElementById("themeToggle").addEventListener("click", function(){
      var current = document.documentElement.getAttribute("data-theme")
      var next = current==="dark" ? "light" : "dark"
      localStorage.setItem("theme", next)
      applyTheme(next)
    })

    var API_BASE = (location.hostname==="localhost"||location.hostname==="127.0.0.1")
      ? (location.port==="5600" ? "" : "http://localhost:5600")
      : ""
    
    var loginView = document.getElementById("loginView")
    var adminView = document.getElementById("adminView")
    var loginBtn = document.getElementById("loginBtn")
    var logoutBtn = document.getElementById("logoutBtn")
    var msgList = document.getElementById("msgList")

    function checkAuth(){
      return sessionStorage.getItem("auth") === "true"
    }

    function render(){
      if(checkAuth()){
        loginView.classList.add("hidden")
        adminView.classList.remove("hidden")
        logoutBtn.classList.remove("hidden")
        loadMessages()
      } else {
        loginView.classList.remove("hidden")
        adminView.classList.add("hidden")
        logoutBtn.classList.add("hidden")
      }
    }

    loginBtn.addEventListener("click", function(){
      var p = document.getElementById("password").value
      if(!p){
        document.getElementById("loginError").textContent = "Please enter a password"
        return
      }
      loginBtn.setAttribute("disabled", "true")
      loginBtn.textContent = "Logging in..."
      fetch(API_BASE+"/api/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: p })
      }).then(function(r){
        if(r.ok) return r.json()
        throw new Error("unauthorized")
      }).then(function(data){
        sessionStorage.setItem("auth", "true")
        sessionStorage.setItem("admin_key", data.token)
        render()
      }).catch(function(){
        document.getElementById("loginError").textContent = "Invalid password"
      }).finally(function(){
        loginBtn.removeAttribute("disabled")
        loginBtn.textContent = "Login"
      })
    })

    logoutBtn.addEventListener("click", function(){
      sessionStorage.removeItem("auth")
      sessionStorage.removeItem("admin_key")
      render()
    })

    function loadMessages(){
      msgList.innerHTML = "<div style='text-align:center; padding:20px'>Loading...</div>"
      var key = sessionStorage.getItem("admin_key") || ""
      fetch(API_BASE+"/api/messages", {
        headers: { "X-Admin-Key": key }
      }).then(function(r){
        if(!r.ok) throw new Error()
        return r.json()
      }).then(function(items) {
        msgList.innerHTML = ""
        if(!items || items.length===0){
          msgList.innerHTML = "<div style='text-align:center; padding:20px'>No messages found.</div>"
          return
        }
        items.forEach(function(item) {
          var div = document.createElement("div")
          div.className = "msg-card"
          var date = new Date(item.createdAt).toLocaleString()
          div.innerHTML = `
            <div class="msg-header">
              <strong>${esc(item.name)}</strong>
              <span>${date}</span>
            </div>
            <div class="msg-body">${esc(item.content)}</div>
            <div class="msg-actions">
              <button class="btn ghost delete-btn" onclick="deleteMsg(${item.id})">Delete</button>
            </div>
          `
          msgList.appendChild(div)
        })
      }).catch(function() {
        msgList.innerHTML = "<div style='text-align:center; padding:20px; color:red'>Failed to load messages. Check API or your connection.</div>"
      })
    }

    window.deleteMsg = function(id){
      if(!confirm("Are you sure you want to delete this message?")) return
      
      var key = sessionStorage.getItem("admin_key") || ""
      
      fetch(API_BASE+"/api/messages?id="+id, {
        method: "DELETE",
        headers: {
            "X-Admin-Key": key
        }
      }).then(r => {
        if(r.ok){
          loadMessages()
        } else {
          alert("Failed to delete. Check server logs or ADMIN_KEY.")
        }
      })
    }

    document.getElementById("refreshBtn").addEventListener("click", loadMessages)

    function esc(s){
      return (s||"").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    }

    render()
  </script>
</body>
</html>
